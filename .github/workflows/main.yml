name: Build Android APK

on:
  push:
    branches:
      - main # Pastikan nama branch utama lu sesuai (main/master)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil source code dari repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java JDK 17 (standar Android Studio terbaru)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Kasih izin akses biar Gradle wrapper bisa jalan
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 4. Proses kompilasi jadi APK versi Debug
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. Upload file APK ke tab Actions biar bisa didownload
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeminiChatApp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
